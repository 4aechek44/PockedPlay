<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP-game-hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <script src="navbar.js" defer></script>
 
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: #020d1a;
            color: #cce8ff;
        }
 
        /* Canvas фиксирован на весь экран позади всего */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
 
        /* Весь контент поверх canvas */
        .content {
            position: relative;
            z-index: 1;
            padding-bottom: 80px;
        }
 
        h2.title {
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            font-size: 20px;
            color: #7ecfff;
            letter-spacing: 3px;
            margin-top: 60px;
            margin-bottom: 10px;
            text-shadow: 0 0 12px #3ab0ff88;
        }
 
        .subtitle {
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: #4a90b8;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }
 
        /* Сетка карточек — авто-колонки минимум 220px */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 30px;
        }
 
        /* Карточка игры — ссылка целиком кликабельна */
        .game-card {
            background: rgba(0, 30, 60, 0.75);
            border: 2px solid #1a4a6a;
            padding: 28px 20px 22px;
            text-align: center;
            text-decoration: none;
            color: #a8d8f0;
            font-family: 'VT323', monospace;
            font-size: 26px;
            position: relative;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
            backdrop-filter: blur(4px);
        }
 
        /* SVG иконка: фиксированный размер, pixelated = без сглаживания */
        .game-card .icon {
            display: block;
            width: 48px;
            height: 48px;
            margin: 0 auto 14px;
            image-rendering: pixelated;
        }
 
        .game-card .name { display: block; letter-spacing: 1px; }
 
        /* Жанр под названием */
        .game-card .tag {
            display: block;
            font-size: 16px;
            color: #4a7a9a;
            margin-top: 6px;
        }
 
        .game-card:hover {
            border-color: #3ab0ff;
            background: rgba(0, 60, 100, 0.85);
            transform: translateY(-4px);
            color: #e0f4ff;
        }
 
        /* Иконка ярче при наведении */
        .game-card:hover .icon { filter: brightness(1.3); }
 
        /* Маленький треугольник в углу каждой карточки */
        .game-card::before {
            content: '▶';
            position: absolute;
            top: 8px; left: 10px;
            font-size: 10px;
            color: #2a6a8a;
        }
    </style>
</head>
<body>
 
<canvas id="bgCanvas"></canvas>
 
<div class="content">
    <!-- Навбар вставляется автоматически через navbar.js -->
 
    <h2 class="title">// ИГРЫ //</h2>
    <p class="subtitle">~ выбери игру и вперёд ~</p>
 
    <!--
        Каждая карточка — это <a> ссылка с тремя элементами:
        .icon  — SVG иконка нарисованная пикселями (shape-rendering="crispEdges" = чёткие края)
        .name  — название игры
        .tag   — жанр
    -->
    <div class="game-grid">
 
        <!-- ЗМЕЙКА: зелёная змейка буквой S -->
        <a class="game-card" href="games/snake.html">
            <svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="8"  y="0"  width="2" height="2" fill="#4dff91"/>
                <rect x="10" y="0"  width="2" height="2" fill="#4dff91"/>
                <rect x="12" y="0"  width="2" height="2" fill="#4dff91"/><!-- голова -->
                <rect x="12" y="2"  width="2" height="2" fill="#4dff91"/>
                <rect x="12" y="4"  width="2" height="2" fill="#2acc6a"/>
                <rect x="10" y="4"  width="2" height="2" fill="#2acc6a"/>

                <rect x="6"  y="6"  width="2" height="2" fill="#1faa55"/>

                <rect x="8"  y="8"  width="2" height="2" fill="#1faa55"/>
                <rect x="10" y="8"  width="2" height="2" fill="#1faa55"/>
                <rect x="12" y="8"  width="2" height="2" fill="#1faa55"/>
                <rect x="12" y="10" width="2" height="2" fill="#178844"/>
                <rect x="12" y="12" width="2" height="2" fill="#178844"/>
                <rect x="10" y="12" width="2" height="2" fill="#178844"/>
                <rect x="8"  y="12" width="2" height="2" fill="#178844"/>
                <rect x="13" y="1"  width="1" height="1" fill="#000"/><!-- глаз -->
            </svg>
            <span class="name">Змейка</span>
            <span class="tag">аркада</span>
        </a>
 
        <!-- ДИНОЗАВРИК: голубой дино с хвостом и ногами -->
        <a class="game-card" href="games/dino.html">
            <svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="4"  y="5"  width="8"  height="6"  fill="#7ecfff"/><!-- тело -->

                <rect x="14" y="3"  width="1"  height="1"  fill="#020d1a"/><!-- глаз -->
                <rect x="15" y="6"  width="1"  height="1"  fill="#fff"/>   <!-- зуб -->
                <rect x="1"  y="7"  width="3"  height="3"  fill="#7ecfff"/><!-- хвост -->
                <rect x="0"  y="9"  width="2"  height="2"  fill="#5ab8f0"/>
                <rect x="5"  y="11" width="2"  height="3"  fill="#5ab8f0"/><!-- ноги -->
                <rect x="9"  y="11" width="2"  height="3"  fill="#5ab8f0"/>
                <rect x="4"  y="14" width="4"  height="2"  fill="#3a98d0"/><!-- ступни -->
                <rect x="8"  y="14" width="4"  height="2"  fill="#3a98d0"/>
            </svg>
            <span class="name">Динозаврик</span>
            <span class="tag">раннер</span>
        </a>
 
        <!-- УГАДАЙ ЧИСЛО: жёлтый знак вопроса -->
        <a class="game-card" href="games/number.html">
            <svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="4"  y="2"  width="8"  height="2"  fill="#ffd84d"/>
                <rect x="2"  y="4"  width="2"  height="2"  fill="#ffd84d"/>
                <rect x="12" y="4"  width="2"  height="2"  fill="#ffd84d"/>
                <rect x="10" y="6"  width="4"  height="2"  fill="#ffd84d"/>

        <!-- КЛИКЕР: курсор с монеткой -->
        <a class="game-card" href="games/clicker.html">
            <svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="8"  y="0"  width="6"  height="2"  fill="#ffd84d"/><!-- монета -->
                <rect x="6"  y="2"  width="8"  height="2"  fill="#ffd84d"/>
                <rect x="6"  y="4"  width="8"  height="2"  fill="#ffd84d"/>
                <rect x="8"  y="6"  width="6"  height="2"  fill="#ffd84d"/>
                <rect x="9"  y="2"  width="2"  height="4"  fill="#e6b800"/><!-- знак $ -->
                <rect x="0"  y="4"  width="2"  height="8"  fill="#a8d8f0"/><!-- курсор -->

                <rect x="2"  y="14" width="4"  height="2"  fill="#7ab8d8"/><!-- низ курсора -->
            </svg>
            <span class="name">Кликер</span>
            <span class="tag">idle</span>
        </a>
 
        <!-- КАМЕНЬ-НОЖНИЦЫ-БУМАГА: пиксельный кулак -->
        <a class="game-card" href="games/stone.html">
            <svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="2"  y="6"  width="12" height="8"  fill="#f0c080"/><!-- ладонь -->

                <rect x="6"  y="5"  width="2"  height="1"  fill="#d4a060"/>
                <rect x="8"  y="5"  width="2"  height="1"  fill="#d4a060"/>
                <rect x="10" y="6"  width="2"  height="1"  fill="#d4a060"/>
                <rect x="0"  y="8"  width="4"  height="3"  fill="#f0c080"/><!-- большой палец -->
                <rect x="0"  y="7"  width="2"  height="2"  fill="#f0c080"/>
                <rect x="3"  y="14" width="10" height="2"  fill="#d4a060"/><!-- низ ладони -->
            </svg>
            <span class="name">Камень-ножницы-бумага</span>
            <span class="tag">удача</span>
        </a>
 
        <!-- ТЕТРИС: разноцветные тетрис-блоки -->
        <a class="game-card" href="games/tetris.html">
            <svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <rect x="0"  y="0"  width="4"  height="4"  fill="#3ab0ff"/><!-- L-блок -->
                <rect x="0"  y="4"  width="4"  height="4"  fill="#3ab0ff"/>
                <rect x="4"  y="4"  width="4"  height="4"  fill="#3ab0ff"/>
                <rect x="4"  y="0"  width="4"  height="4"  fill="#ffd84d"/><!-- S-блок -->
                <rect x="8"  y="0"  width="4"  height="4"  fill="#ffd84d"/>

                <rect x="12" y="0"  width="4"  height="4"  fill="#ff5555"/><!-- I-блок -->
                <rect x="12" y="4"  width="4"  height="4"  fill="#ff5555"/>
                <rect x="0"  y="8"  width="4"  height="4"  fill="#4dff91"/><!-- заполненный ряд -->

                <rect x="0"  y="12" width="16" height="4"  fill="#aaa"/>   <!-- дно -->
                <rect x="1"  y="1"  width="1"  height="1"  fill="#7dd4ff"/><!-- блики -->
                <rect x="5"  y="1"  width="1"  height="1"  fill="#ffe680"/>
                <rect x="13" y="1"  width="1"  height="1"  fill="#ff8888"/>
            </svg>

<script>
    // =====================
    // НАСТРОЙКА CANVAS
    // =====================
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');
 
    // Подгоняем canvas под размер окна при загрузке и изменении размера
    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
 
    // =====================
    // КОНСТАНТЫ
    // =====================
    const P  = 4;                                          // размер одного пикселя
    const r  = v => Math.random() * v;                    // случайный float 0..v
    const ri = (a, b) => Math.floor(a + Math.random() * (b - a)); // случайный int a..b
    const px = v => Math.round(v / P) * P;                // округление до сетки пикселей
 
    // Цветовая палитра подводного мира
    const C = {
        bubble: 'rgba(100,200,255,0.18)', // пузырёк
        fish1:  '#1a6a9a',                // рыба синяя
        fish2:  '#0a4a7a',                // рыба тёмная
        jelly:  'rgba(180,100,255,0.5)',  // медуза
        coral1: '#8b1a1a',                // коралл красный
        coral2: '#1a5a3a',                // коралл зелёный
        coral3: '#6a3a8a',                // коралл фиолетовый
        seaweed:'#0d3d22',                // водоросль
        sand:   '#1a1408',                // верхний слой дна
        sand2:  '#251e0a',                // нижний слой дна
    };
 
    // =====================
    // СОЗДАНИЕ ОБЪЕКТОВ СЦЕНЫ
    // =====================
 
    // Пузырьки — поднимаются вверх с покачиванием
    const bubbles = Array.from({length: 40}, () => ({
        x:     r(canvas.width),
        y:     r(canvas.height),
        size:  ri(1, 4),
        speed: 0.3 + r(0.7),
    }));
 
    // Рыбки — плывут горизонтально, dir: 1=вправо, -1=влево
    const fishes = Array.from({length: 12}, () => ({
        x:          r(canvas.width),
        y:          50 + r(canvas.height * 0.7),
        dir:        Math.random() < 0.5 ? 1 : -1,
        speed:      0.8 + r(1.2),
        size:       ri(1, 3),  // 1=маленькая, 2=средняя, 3=большая
        color:      Math.random() < 0.5 ? C.fish1 : C.fish2,
        frame:      0,         // кадр анимации плавника (0 или 1)
        frameTimer: 0,         // счётчик до смены кадра
    }));
 
    // Медузы — покачиваются по синусу и медленно всплывают
    const jellies = Array.from({length: 6}, (_, i) => ({
        x:     100 + i * 200 + r(100),
        y:     100 + r(canvas.height * 0.5),
        phase: r(Math.PI * 2), // сдвиг фазы — у каждой своё покачивание
        speed: 0.3 + r(0.3),
        size:  20 + ri(0, 3) * 8,
    }));
 
    // Кораллы на дне — статичные, 3 вида
    const corals = Array.from({length: 16}, (_, i) => ({
        x:     i * 120 + r(60),
        type:  ri(0, 3),
        h:     20 + ri(0, 5) * 8,
        color: [C.coral1, C.coral2, C.coral3][ri(0, 3)],
    }));
 
    // Водоросли — покачиваются влево-вправо
    const weeds = Array.from({length: 20}, (_, i) => ({
        x:     i * 100 + r(50),
        h:     30 + ri(0, 6) * 8,
        phase: r(Math.PI * 2),
    }));
 
    // Лучи света сверху — полупрозрачные вертикальные полосы
    const rays = Array.from({length: 5}, (_, i) => ({
        x: 100 + i * 220 + r(100),
        w: 30 + ri(0, 4) * 10,
    }));
 
    // =====================
    // ФУНКЦИИ РИСОВАНИЯ
    // =====================
 
    function drawRay(x, w, H) {
        // Луч света: градиент от полупрозрачного вверху до прозрачного внизу
        const grad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
        grad.addColorStop(0, 'rgba(60,160,255,0.07)');
        grad.addColorStop(1, 'rgba(60,160,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(px(x), 0, px(w), px(H * 0.7));
    }
 
    function drawSeaweed(x, sandY, h, phase, t) {
        // Водоросль: столбик пикселей, каждый сдвинут по синусу — имитация покачивания
        ctx.fillStyle = C.seaweed;
        for (let i = 0; i < h; i += P) {
            const sway = Math.sin(t * 0.02 + phase + i * 0.05) * 6;
            ctx.fillRect(px(x + sway), px(sandY - i - P), P * 2, P);
        }
    }
 
    function drawCoral(x, sandY, h, type, color) {
        ctx.fillStyle = color;
        if (type === 0) {
            // Ветвистый коралл: ствол + перекладина + две ветки
            ctx.fillRect(px(x+4), px(sandY-h),     px(4),  px(h));
            ctx.fillRect(px(x),   px(sandY-h*0.6), px(12), px(4));
            ctx.fillRect(px(x),   px(sandY-h*0.8), px(4),  px(h*0.25));
            ctx.fillRect(px(x+8), px(sandY-h*0.7), px(4),  px(h*0.2));
        } else if (type === 1) {
            // Округлый куст: три прямоугольника ступеньками
            ctx.fillRect(px(x),   px(sandY-h*0.5), px(16), px(h*0.5));
            ctx.fillRect(px(x+2), px(sandY-h),     px(12), px(h*0.55));
            ctx.fillRect(px(x+4), px(sandY-h*1.2), px(8),  px(h*0.3));
        } else {
            // Трубчатый коралл: просто столбик с шапкой
            ctx.fillRect(px(x+2), px(sandY-h), px(6),  px(h));
            ctx.fillRect(px(x),   px(sandY-h), px(10), px(6));
        }
    }
 
    function drawFish(x, y, dir, size, color, frame) {
        // Рыбка: тело + морда + хвост + плавник (анимирован) + глаз
        const s = size * 6;
        ctx.fillStyle = color;
        if (dir === 1) {
            // Плывёт вправо
            ctx.fillRect(px(x),       px(y),       px(s*2), px(s));      // тело
            ctx.fillRect(px(x+s*2),   px(y),       px(s),   px(s));      // морда
            ctx.fillRect(px(x-s),     px(y),       px(s),   px(s));      // хвост верх
            ctx.fillRect(px(x-s),     px(y+s*0.6), px(s),   px(s*0.4)); // хвост низ
            if (frame === 0)
                ctx.fillRect(px(x+s*0.5), px(y-s*0.5), px(s), px(s*0.5)); // плавник вверх
            ctx.fillStyle = '#cce8ff';
            ctx.fillRect(px(x+s*2), px(y+P), px(P), px(P)); // глаз
        } else {
            // Плывёт влево (зеркально)
            ctx.fillStyle = color;
            ctx.fillRect(px(x),       px(y),       px(s*2), px(s));
            ctx.fillRect(px(x-s),     px(y),       px(s),   px(s));
            ctx.fillRect(px(x+s*2),   px(y),       px(s),   px(s));
            ctx.fillRect(px(x+s*2),   px(y+s*0.6), px(s),   px(s*0.4));
            if (frame === 0)
                ctx.fillRect(px(x+s*0.5), px(y-s*0.5), px(s), px(s*0.5));
            ctx.fillStyle = '#cce8ff';
            ctx.fillRect(px(x-P), px(y+P), px(P), px(P));
        }
    }
 
    function drawJelly(x, y, size) {
        // Медуза: купол из трёх слоёв + пять щупалец
        ctx.fillStyle = C.jelly;
        ctx.fillRect(px(x),           px(y),           px(size),     px(size*0.5));  // основание купола
        ctx.fillRect(px(x+size*0.1),  px(y-size*0.2),  px(size*0.8), px(size*0.25));// середина
        ctx.fillRect(px(x+size*0.3),  px(y-size*0.35), px(size*0.4), px(size*0.18));// верхушка
        // Щупальца — 5 вертикальных полосок
        [0.1, 0.3, 0.5, 0.7, 0.9].forEach(t =>
            ctx.fillRect(px(x + size*t), px(y + size*0.5), px(P), px(size*0.6))
        );
    }
 
    function drawBubble(x, y, size) {
        // Пузырёк: квадрат + маленький блик в углу
        ctx.fillStyle = C.bubble;
        ctx.fillRect(px(x), px(y), px(size*P), px(size*P));
        ctx.fillStyle = 'rgba(180,230,255,0.3)';
        ctx.fillRect(px(x), px(y), px(P), px(P)); // блик
    }
 
    // =====================
    // ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ
    // =====================
    let tick = 0; // счётчик кадров
 
    function draw() {
        const W     = canvas.width;
        const H     = canvas.height;
        const sandY = H * 0.85; // Y-координата поверхности дна
 
        ctx.clearRect(0, 0, W, H);
 
        // --- Фон: тёмный градиент воды сверху вниз ---
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0,   '#020d1a');
        grad.addColorStop(0.5, '#041828');
        grad.addColorStop(1,   '#010a12');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
 
        // --- Лучи света сверху (статичные) ---
        rays.forEach(ray => drawRay(ray.x, ray.w, H));
 
        // --- Водоросли покачиваются ---
        weeds.forEach(w => drawSeaweed(w.x % W, sandY, w.h, w.phase, tick));
 
        // --- Кораллы на дне ---
        corals.forEach(c => drawCoral(c.x % W, sandY, c.h, c.type, c.color));
 
        // --- Дно: верхняя полоса + закрашенный прямоугольник ---
        ctx.fillStyle = C.sand;
        ctx.fillRect(0, px(sandY), W, P * 3);
        ctx.fillStyle = C.sand2;
        ctx.fillRect(0, px(sandY + P*3), W, H - sandY);
 
        // --- Медузы: покачиваются по синусу, медленно всплывают ---
        jellies.forEach(j => {
            const sway = Math.sin(tick * 0.02 + j.phase) * 15; // горизонтальное покачивание
            const bob  = Math.sin(tick * 0.015 + j.phase) * 8; // вертикальное покачивание
            drawJelly(j.x + sway, j.y + bob, j.size);
            j.y -= j.speed * 0.3; // медленно поднимается
            if (j.y + j.size < 0) j.y = sandY - ri(20, 80); // сброс вниз
        });
 
        // --- Рыбки: плывут, анимация плавника ---
        fishes.forEach(f => {
            if (++f.frameTimer > 12) { f.frame = 1 - f.frame; f.frameTimer = 0; } // смена кадра каждые 12 тиков
            drawFish(f.x, f.y, f.dir, f.size, f.color, f.frame);
            f.x += f.dir * f.speed;
            // При выходе за экран — появляется с противоположной стороны
            if (f.dir ===  1 && f.x > W + 60) { f.x = -60;    f.y = 50 + r(H * 0.7); }
            if (f.dir === -1 && f.x < -60)     { f.x = W + 60; f.y = 50 + r(H * 0.7); }
        });
 
        // --- Пузырьки: поднимаются вверх с покачиванием ---
        bubbles.forEach(b => {
            drawBubble(b.x, b.y, b.size);
            b.y -= b.speed;
            b.x += Math.sin(tick * 0.03 + b.y * 0.01) * 0.4; // лёгкое покачивание
            if (b.y < -10) { b.y = H + 10; b.x = r(W); } // сброс вниз
        });
 
        tick++;
        requestAnimationFrame(draw); // следующий кадр
    }
 
    draw(); // запуск
</script>
