<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP - Угадай число</title>

    <style>

    </style>
</head>
<body>
    <!-- НАВБАР -->
    <nav id="main-nav">
        <button><a href="../index.html">Главная</a></button>
        <button><a href="../gamehub.html">Игры</a></button>
        <button><a href="../profile.html">Профиль</a></button>
    </nav>
    <!-- РАНДОМАЙЗЕР -->
    <script>
        function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        const randomNumber = getRandomInt(1, 100);
        console.log(randomNumber);
        const userGuess = document.getElementById("guessInput").value;
            
        function checkGuess() {
        const userGuess = Number(document.getElementById("guessInput").value);

        if (userGuess === randomNumber) {
            alert("🎉 Ты угадал!");
        } else if (userGuess > randomNumber) {
            alert("Слишком большое число");
        } else {
            alert("Слишком маленькое число");
    }
}    
    </script>
    
        <!-- ЗАГОЛОВОК -->
    <h1>Угадай число</h1>
    <p>В этой игре я загадываю число от 1 до 100 и тебе нужно угадать какое</p>
    <p>Удачи :ъ</p>

        <!-- КНОПКИ -->
    <input type="text" id="guessInput">
    <button onclick="checkGuess()">Подтвердить</button>
    <button onclick="location.reload()">Новое число</button>
</body>
</html>
