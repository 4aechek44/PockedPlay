<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP - Угадай число</title>
    
    <style>
        
    #main-nav {
        display: flex;
        gap: 6px;
        padding: 10px 16px;
        font-size: 20px;
        backdrop-filter: blur(2px);
        /* Навбар всегда поверх canvas-фона */
        position: relative;
        z-index: 10;
    }
 
        /* Все кнопки навбара */
        #main-nav button {
        border: 2px solid #555;
        font-size: 14px;
        padding: 6px 12px;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s;
    }
 
        #main-nav button:hover {
        background: #fff;
    }
 
        /* Ссылки внутри кнопок — убираем стандартное оформление */
        #main-nav button a {
        text-decoration: none;
        color: #222;
    }

    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }   
    h1{
        text-align: center;
        font-family: 'Press Start 2P', monospace;
        padding: 10px;

    }
    p{
        text-align: center;
        font-size: 20px;
        font-family: 'Press Start 2P', monospace;
        padding: 10px;
    }
    .buttons{            
        text-align: center;
        font-size: 30px;          
    }
    </style>
</head>
<body>

      
    <!-- НАВБАР -->
    <nav id="main-nav">
        <button><a href="../index.html">Главная</a></button>
        <button><a href="../gamehub.html">Игры</a></button>
    </nav>
    
        <!-- ЗАГОЛОВОК -->
    <h1>Угадай число</h1>
    <p>В этой игре я загадываю число от 1 до 100 и тебе нужно угадать какое</p>
    <p>Удачи :ъ</p>
    
    <!-- КНОПКИ -->
<div class="buttons">
    <input type="text" id="guessInput">
    <button onclick="checkGuess()">Подтвердить</button>  <!-- ✅ исправлено onclick -->
    <button onclick="location.reload()">Новое число</button>
</div>

    <!-- РАНДОМАЙЗЕР -->
<script>
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    const randomNumber = getRandomInt(1, 100);

    function checkGuess() {
        const userGuess = Number(document.getElementById("guessInput").value);

        if (userGuess === randomNumber) {
            alert("🎉 Ты угадал!");
        } else if (userGuess > randomNumber) {
            alert("Слишком большое число");
        } else {
            alert("Слишком маленькое число");
        }
    }
</script>
</body>
</html>
